services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myfastapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: my-fastapi-blogicum
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    build:
      context: .
    pull_policy: build
    entrypoint: ./entrypoint.sh
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
